<div class="not-found">
  <p>{{ errorCode }}</p>
  <img
    [alt]="pageNotFoundPicture.imageAlt"
    [src]="pageNotFoundPicture.imageSrc"
    [title]="pageNotFoundPicture.imageTitle"
  />
  <h1>{{ errorCodeMsg | titlecase }}</h1>
  <br />
  <app-button
    [routerLink]="homePage"
    [buttonText]="buttonText | titlecase"
    [buttonStyle]="buttonStyle"
  ></app-button>
</div>
