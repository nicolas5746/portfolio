<div class="not-found">
  <p>{{ notFound.errorCode }}</p>
  <img
    [alt]="notFound.imageAlt"
    [src]="notFound.imageSrc"
    [title]="notFound.imageTitle"
  />
  <h1>{{ notFound.errorCodeMsg | titlecase }}</h1>
  <br />
  <app-button
    [routerLink]="homePage"
    [buttonText]="notFound.buttonText | titlecase"
    [buttonStyle]="notFound.buttonStyle"
  ></app-button>
</div>
